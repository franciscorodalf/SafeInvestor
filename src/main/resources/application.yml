spring:
  application:
    name: safeinvestor

  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:safeinvestor}}
    username: ${DB_USERNAME:safeinvestor}
    password: ${DB_PASSWORD:safeinvestor}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    es.franciscorodalf.safeinvestor: INFO
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET:dev-secret-please-change-in-production-this-needs-to-be-at-least-32-bytes}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  email:
    # Si MAIL_HOST está vacío o enabled=false → solo se loguean los emails (modo dev)
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:SafeInvestor <no-reply@safeinvestor.app>}
    reminders:
      # Cron diario para enviar recordatorios de tareas vencidas. Formato: sec min hora dia mes diaSem
      cron: ${TAREAS_REMINDER_CRON:0 0 9 * * *}
