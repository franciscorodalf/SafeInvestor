<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Layout base para emails. Uso:
    <div th:replace="~{email/_layout :: shell(~{::title}, ~{::body-content})}"></div>
  Pasa dos fragmentos: title (string) y body-content (markup).
  Todos los estilos son inline para máxima compatibilidad con clientes de email.
-->
<div th:fragment="shell(emailTitle, content)">

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
           style="background:#FAF7F2; padding:24px 0; font-family:'Helvetica Neue',Arial,sans-serif; color:#1A1410;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="560"
                       style="background:#FFFFFF; border-radius:16px; box-shadow:0 6px 24px rgba(26,20,16,0.06); overflow:hidden;">

                    <!-- Header -->
                    <tr>
                        <td style="padding:28px 32px 8px 32px; border-bottom:1px solid #E8DFD2;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td style="font-family:Georgia,'Times New Roman',serif; font-weight:400; font-size:22px; color:#1A1410; padding-right:8px;">
                                        SafeInvestor
                                    </td>
                                </tr>
                            </table>
                            <p style="margin:6px 0 0 0; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#6B6358;"
                               th:text="${emailTitle}">Notificación</p>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding:28px 32px 32px 32px; font-size:15px; line-height:1.55; color:#1A1410;">
                            <div th:replace="${content}"></div>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding:18px 32px 26px 32px; border-top:1px solid #E8DFD2; font-size:12px; color:#6B6358;">
                            <p style="margin:0;">
                                Tu dinero, con la calma que merece.
                            </p>
                            <p style="margin:6px 0 0 0;">
                                <a th:href="${baseUrl}" style="color:#0E5C5F; text-decoration:none;" th:text="${baseUrl}">https://safeinvestor.onrender.com</a>
                            </p>
                        </td>
                    </tr>
                </table>

                <p style="font-size:11px; color:#9E978B; margin:14px 0 0 0;">
                    © 2026 SafeInvestor — proyecto educativo, no es un servicio financiero real.
                </p>
            </td>
        </tr>
    </table>

</div>

<!-- Botón CTA reutilizable: pasa textoCta y urlCta como variables del contexto -->
<a th:fragment="cta(text, url)" th:href="${url}"
   style="display:inline-block; background:#0E5C5F; color:#FAF7F2; text-decoration:none; padding:13px 24px; border-radius:10px; font-weight:500; font-size:15px; margin:8px 0;">
    <span th:text="${text}">Acción</span>
</a>

</body>
</html>
