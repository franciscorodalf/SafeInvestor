<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{email.reset.subject}">Restablecer contraseña</title>
</head>
<body>
<div th:replace="~{email/_layout :: shell(#{email.reset.eyebrow}, ~{:: #content})}">

    <div id="content">
        <h1 style="font-family:Georgia,'Times New Roman',serif; font-weight:400; font-size:28px; line-height:1.2; margin:0 0 16px 0; color:#1A1410;"
            th:text="#{email.reset.headline(${nombre})}">Hola Francisco,</h1>

        <p th:text="#{email.reset.body1}">
            Recibimos una solicitud para restablecer la contraseña de tu cuenta en SafeInvestor.
        </p>

        <p style="margin-top:18px;">
            <a th:href="${resetUrl}"
               style="display:inline-block; background:#0E5C5F; color:#FAF7F2; text-decoration:none; padding:13px 24px; border-radius:10px; font-weight:500; font-size:15px;"
               th:text="#{email.reset.cta}">Establecer nueva contraseña</a>
        </p>

        <p style="margin-top:18px; font-size:13px; color:#6B6358;" th:text="#{email.reset.expiry}">
            Este enlace caduca en 1 hora.
        </p>

        <hr style="border:none; border-top:1px solid #E8DFD2; margin:24px 0;">

        <p style="font-size:13px; color:#6B6358;" th:text="#{email.reset.ignored}">
            Si no fuiste tú, ignora este email. No se ha modificado nada en tu cuenta.
        </p>
    </div>

</div>
</body>
</html>
