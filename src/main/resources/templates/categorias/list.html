<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Categorías')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav('categorias')}"></nav>

<main class="max-w-3xl mx-auto px-5 py-8">

    <header class="mb-8 fade-up">
        <p class="text-xs tracking-[0.18em] uppercase text-ink-soft mb-1">Cómo clasificas</p>
        <h1 class="font-display text-5xl leading-tight">Categorías</h1>
    </header>

    <!-- Form crear nueva -->
    <form method="post" action="/categorias" class="bg-surface border border-line rounded-lg p-5 mb-6 shadow-sm flex flex-col sm:flex-row gap-3 items-end">
        <label class="flex-1 block w-full">
            <span class="text-xs text-ink-soft mb-1 block uppercase tracking-wider">Nueva categoría</span>
            <input name="nombre" type="text" required maxlength="50"
                   placeholder="Mascotas, Viajes, Café..." class="input">
        </label>
        <label class="block">
            <span class="text-xs text-ink-soft mb-1 block uppercase tracking-wider">Color</span>
            <input name="color" type="color" value="#6B7280" class="w-14 h-11 rounded-lg border border-line cursor-pointer">
        </label>
        <button class="btn btn-primary"><i class="ph ph-plus"></i> Añadir</button>
    </form>

    <!-- Lista categorías -->
    <section class="bg-surface border border-line rounded-lg shadow-sm overflow-hidden">
        <div th:if="${#lists.isEmpty(categorias)}" class="px-6 py-12 text-center">
            <p class="text-ink-soft">No tienes categorías.</p>
        </div>
        <ul class="divide-y divide-line">
            <li th:each="c : ${categorias}" class="px-5 py-3.5 flex items-center justify-between gap-4 hover:bg-bg-soft/40 group">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <span class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                          th:style="'background-color:' + ${c.color} + '22'">
                        <span class="w-3 h-3 rounded-full" th:style="'background-color:' + ${c.color}"></span>
                    </span>
                    <span class="font-medium truncate" th:text="${c.nombre}">Comida</span>
                    <span class="font-mono text-xs text-ink-soft uppercase tracking-wider" th:text="${c.color}">#F59E0B</span>
                </div>
                <form th:action="@{/categorias/{id}/borrar(id=${c.id})}" method="post" class="opacity-0 group-hover:opacity-100 transition-opacity">
                    <button class="w-9 h-9 rounded-lg hover:bg-negative-soft flex items-center justify-center text-ink-soft hover:text-negative"
                            onclick="return confirm('¿Borrar esta categoría?')" title="Borrar">
                        <i class="ph ph-trash"></i>
                    </button>
                </form>
            </li>
        </ul>
    </section>

    <p class="text-xs text-ink-soft mt-4 text-center">
        <i class="ph ph-info"></i>
        Al borrar una categoría, los movimientos asociados quedan sin categoría (no se borran).
    </p>

</main>
</body>
</html>
