<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Registro — SafeInvestor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
<form th:action="@{/register}" th:object="${form}" method="post" class="bg-white p-8 rounded shadow w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-6 text-center">Crear cuenta</h1>
    <div th:if="${error}" class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm" th:text="${error}"></div>
    <label class="block mb-3">
        <span class="text-sm text-gray-700">Nombre</span>
        <input th:field="*{nombre}" type="text" required maxlength="100" class="mt-1 w-full px-3 py-2 border rounded">
        <span class="text-red-600 text-xs" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
    </label>
    <label class="block mb-3">
        <span class="text-sm text-gray-700">Email</span>
        <input th:field="*{email}" type="email" required class="mt-1 w-full px-3 py-2 border rounded">
        <span class="text-red-600 text-xs" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </label>
    <label class="block mb-4">
        <span class="text-sm text-gray-700">Contraseña (mín. 8 caracteres)</span>
        <input th:field="*{password}" type="password" required minlength="8" class="mt-1 w-full px-3 py-2 border rounded">
        <span class="text-red-600 text-xs" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
    </label>
    <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Crear cuenta</button>
    <a href="/login" class="block mt-4 text-sm text-center text-blue-600 hover:underline">¿Ya tienes cuenta? Entra</a>
</form>
</body>
</html>
