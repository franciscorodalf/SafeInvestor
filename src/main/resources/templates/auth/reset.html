<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Nueva contraseña')}"></head>
<body class="min-h-screen flex flex-col bg-bg">

<header class="px-6 py-5">
    <a href="/" class="flex items-center gap-2.5">
        <img src="/images/logo.png" alt="SafeInvestor" class="h-10 w-10 object-contain">
        <span class="font-display text-2xl">SafeInvestor</span>
    </a>
</header>

<main class="flex-1 flex items-center justify-center px-6 py-8">
    <div class="w-full max-w-md fade-up">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-brand-soft text-brand mb-5">
                <i class="ph ph-lock-key text-2xl"></i>
            </div>
            <h1 class="font-display text-4xl mb-3 leading-tight">Nueva contraseña</h1>
            <p class="text-ink-soft">Elige una nueva contraseña para tu cuenta.</p>
        </div>

        <div th:if="${error}" class="mb-5 p-4 rounded-lg bg-negative-soft text-negative text-sm flex items-start gap-2.5">
            <i class="ph ph-warning-circle text-lg shrink-0 mt-0.5"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{'/reset/' + ${token}}" method="post" class="bg-surface border border-line rounded-lg p-6 shadow-sm space-y-4">
            <label class="block">
                <span class="text-sm text-ink-soft mb-1.5 block">Nueva contraseña <span class="text-ink-soft/60 font-normal">(mín. 8)</span></span>
                <div class="relative">
                    <i class="ph ph-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-soft"></i>
                    <input name="password" type="password" required minlength="8" autofocus
                           placeholder="••••••••" class="input pl-10">
                </div>
            </label>
            <button class="btn btn-primary w-full">
                <i class="ph ph-check text-lg"></i>
                <span>Cambiar contraseña</span>
            </button>
        </form>
    </div>
</main>

</body>
</html>
