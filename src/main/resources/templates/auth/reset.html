<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Restablecer contraseña — SafeInvestor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
<form th:action="@{'/reset/' + ${token}}" method="post" class="bg-white p-8 rounded shadow w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-4 text-center">Nueva contraseña</h1>
    <div th:if="${error}" class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm" th:text="${error}"></div>
    <label class="block mb-4">
        <span class="text-sm text-gray-700">Nueva contraseña (mín. 8)</span>
        <input name="password" type="password" required minlength="8" class="mt-1 w-full px-3 py-2 border rounded">
    </label>
    <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Cambiar contraseña</button>
</form>
</body>
</html>
