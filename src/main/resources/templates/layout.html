<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'SafeInvestor'">SafeInvestor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="text-xl font-bold text-blue-600">SafeInvestor</a>
            <div th:if="${#authentication != null and #authentication.isAuthenticated() and #authentication.principal != 'anonymousUser'}">
                <span th:text="${#authentication.name}" class="mr-4 text-sm"></span>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button class="text-sm text-red-600 hover:underline">Cerrar sesión</button>
                </form>
            </div>
            <div th:unless="${#authentication != null and #authentication.isAuthenticated() and #authentication.principal != 'anonymousUser'}">
                <a href="/login" class="text-sm text-blue-600 hover:underline mr-3">Entrar</a>
                <a href="/register" class="text-sm text-blue-600 hover:underline">Registro</a>
            </div>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div th:replace="${content}">Contenido aquí</div>
    </main>
</body>
</html>
