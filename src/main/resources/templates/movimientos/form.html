<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Movimiento')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav('movimientos')}"></nav>

<main class="max-w-2xl mx-auto px-5 py-10">

    <a href="/movimientos" class="text-sm text-ink-soft hover:text-brand inline-flex items-center gap-1.5 mb-6">
        <i class="ph ph-arrow-left"></i> <span th:text="#{mov.form.back}">Volver</span>
    </a>

    <header class="mb-8 fade-up">
        <p class="text-xs tracking-[0.18em] uppercase text-ink-soft mb-1"
           th:text="${form.id == null} ? #{mov.form.eyebrow_new} : #{mov.form.eyebrow_edit}">Nuevo registro</p>
        <h1 class="font-display text-4xl"
            th:text="${form.id == null} ? #{mov.form.title_new} : #{mov.form.title_edit}">Nuevo movimiento</h1>
    </header>

    <form th:action="${form.id == null ? '/movimientos' : '/movimientos/' + form.id}"
          th:object="${form}" method="post"
          class="bg-surface border border-line rounded-lg p-6 sm:p-8 shadow-sm space-y-5">

        <!-- Tipo (radio segmented) -->
        <fieldset>
            <legend class="text-sm text-ink-soft mb-2 block" th:text="#{mov.form.tipo}">Tipo</legend>
            <div class="grid grid-cols-2 gap-2 p-1 bg-bg-soft rounded-lg">
                <label class="cursor-pointer">
                    <input th:field="*{tipo}" type="radio" value="GASTO" class="peer sr-only">
                    <div class="px-4 py-2.5 rounded-md text-center text-sm font-medium peer-checked:bg-negative peer-checked:text-bg peer-checked:shadow text-ink-soft flex items-center justify-center gap-2">
                        <i class="ph ph-arrow-up-right"></i> <span th:text="#{mov.form.tipo_gasto}">Gasto</span>
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input th:field="*{tipo}" type="radio" value="INGRESO" class="peer sr-only">
                    <div class="px-4 py-2.5 rounded-md text-center text-sm font-medium peer-checked:bg-positive peer-checked:text-bg peer-checked:shadow text-ink-soft flex items-center justify-center gap-2">
                        <i class="ph ph-arrow-down-left"></i> <span th:text="#{mov.form.tipo_ingreso}">Ingreso</span>
                    </div>
                </label>
            </div>
        </fieldset>

        <!-- Importe (hero) -->
        <label class="block">
            <span class="text-sm text-ink-soft mb-1.5 block" th:text="#{mov.form.importe}">Importe</span>
            <div class="relative">
                <input th:field="*{importe}" type="number" step="0.01" min="0.01" required
                       placeholder="0.00"
                       class="input font-mono text-3xl py-4 pr-12 text-right">
                <span class="absolute right-4 top-1/2 -translate-y-1/2 font-mono text-2xl text-ink-soft">€</span>
            </div>
            <span class="text-negative text-xs mt-1 block" th:if="${#fields.hasErrors('importe')}" th:errors="*{importe}"></span>
        </label>

        <!-- Categoría -->
        <label class="block">
            <span class="text-sm text-ink-soft mb-1.5 block" th:text="#{mov.form.categoria}">Categoría</span>
            <select th:field="*{categoriaId}" class="input">
                <option value="" th:text="#{mov.form.sin_categoria}">— Sin categoría —</option>
                <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}"></option>
            </select>
        </label>

        <!-- Descripción -->
        <label class="block">
            <span class="text-sm text-ink-soft mb-1.5 block">
                <span th:text="#{mov.form.descripcion}">Descripción</span>
                <span class="text-ink-soft/60 font-normal" th:text="#{mov.form.descripcion_opt}">(opcional)</span>
            </span>
            <input th:field="*{descripcion}" type="text" maxlength="200"
                   th:placeholder="#{mov.form.descripcion_placeholder}" class="input">
        </label>

        <!-- Fecha -->
        <label class="block">
            <span class="text-sm text-ink-soft mb-1.5 block" th:text="#{mov.form.fecha}">Fecha</span>
            <input th:field="*{fecha}" type="date" required class="input">
        </label>

        <div class="flex justify-end gap-3 pt-3 border-t border-line">
            <a href="/movimientos" class="btn btn-ghost" th:text="#{common.cancel}">Cancelar</a>
            <button class="btn btn-primary">
                <i class="ph ph-check"></i> <span th:text="#{common.save}">Guardar</span>
            </button>
        </div>
    </form>
</main>
</body>
</html>
