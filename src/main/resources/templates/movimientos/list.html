<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Movimientos')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav('movimientos')}"></nav>

<main class="max-w-6xl mx-auto px-5 py-8">

    <header class="flex items-end justify-between mb-8 flex-wrap gap-4 fade-up">
        <div>
            <p class="text-xs tracking-[0.18em] uppercase text-ink-soft mb-1">Tu actividad</p>
            <h1 class="font-display text-5xl leading-tight">Movimientos</h1>
        </div>
        <a href="/movimientos/nuevo" class="btn btn-primary">
            <i class="ph ph-plus text-lg"></i> Nuevo movimiento
        </a>
    </header>

    <!-- Filtros -->
    <form method="get" action="/movimientos"
          class="bg-surface border border-line rounded-lg p-4 mb-6 grid grid-cols-1 sm:grid-cols-4 gap-3 shadow-sm">
        <label class="block">
            <span class="text-xs text-ink-soft mb-1 block uppercase tracking-wider">Categoría</span>
            <select name="categoriaId" class="input">
                <option value="">Todas</option>
                <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}"
                        th:selected="${c.id == currentCategoriaId}"></option>
            </select>
        </label>
        <label class="block">
            <span class="text-xs text-ink-soft mb-1 block uppercase tracking-wider">Desde</span>
            <input type="date" name="desde" th:value="${desde}" class="input">
        </label>
        <label class="block">
            <span class="text-xs text-ink-soft mb-1 block uppercase tracking-wider">Hasta</span>
            <input type="date" name="hasta" th:value="${hasta}" class="input">
        </label>
        <div class="flex items-end gap-2">
            <button class="btn btn-primary flex-1">
                <i class="ph ph-funnel"></i> Filtrar
            </button>
            <a href="/movimientos" class="btn btn-ghost" title="Limpiar"><i class="ph ph-x"></i></a>
        </div>
    </form>

    <!-- Tabla movimientos -->
    <section class="bg-surface border border-line rounded-lg shadow-sm overflow-hidden">

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(movimientos)}" class="px-6 py-16 text-center">
            <div class="inline-flex w-16 h-16 rounded-full bg-bg-soft items-center justify-center text-ink-soft mb-4">
                <i class="ph ph-receipt text-3xl"></i>
            </div>
            <p class="font-display text-2xl mb-2">Sin movimientos.</p>
            <p class="text-ink-soft mb-5">Empieza registrando tu primer gasto o ingreso.</p>
            <a href="/movimientos/nuevo" class="btn btn-primary">
                <i class="ph ph-plus"></i> Crear el primero
            </a>
        </div>

        <ul th:unless="${#lists.isEmpty(movimientos)}" class="divide-y divide-line">
            <li th:each="m : ${movimientos}" class="px-5 sm:px-6 py-4 flex items-center gap-4 hover:bg-bg-soft/40 group">
                <!-- Icono tipo -->
                <div class="w-11 h-11 rounded-full flex items-center justify-center shrink-0"
                     th:classappend="${m.tipo.name() == 'GASTO'} ? 'bg-negative-soft text-negative' : 'bg-positive-soft text-positive'">
                    <i class="ph text-xl"
                       th:classappend="${m.tipo.name() == 'GASTO'} ? 'ph-arrow-up-right' : 'ph-arrow-down-left'"></i>
                </div>

                <!-- Info -->
                <div class="flex-1 min-w-0">
                    <p class="font-medium truncate" th:text="${m.descripcion} ?: '—'">Movimiento</p>
                    <div class="flex items-center gap-2 mt-1 text-xs flex-wrap">
                        <span th:if="${m.categoria != null}" class="pill"
                              th:style="'background-color:' + ${m.categoria.color} + '15; color:' + ${m.categoria.color}">
                            <span class="w-1.5 h-1.5 rounded-full" th:style="'background-color:' + ${m.categoria.color}"></span>
                            <span th:text="${m.categoria.nombre}"></span>
                        </span>
                        <span class="text-ink-soft flex items-center gap-1">
                            <i class="ph ph-calendar text-sm"></i>
                            <span th:text="${#temporals.format(m.fecha, 'dd MMM yyyy')}">06 jun 2026</span>
                        </span>
                    </div>
                </div>

                <!-- Importe -->
                <p class="font-mono font-semibold text-lg sm:text-xl shrink-0"
                   th:classappend="${m.tipo.name() == 'GASTO'} ? 'text-negative' : 'text-positive'"
                   th:text="${(m.tipo.name() == 'GASTO' ? '−' : '+') + #numbers.formatDecimal(m.importe, 1, 2) + ' €'}">+0,00 €</p>

                <!-- Actions -->
                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <a th:href="@{/movimientos/{id}/editar(id=${m.id})}"
                       class="w-9 h-9 rounded-lg hover:bg-bg-soft flex items-center justify-center text-ink-soft hover:text-brand" title="Editar">
                        <i class="ph ph-pencil-simple"></i>
                    </a>
                    <form th:action="@{/movimientos/{id}/borrar(id=${m.id})}" method="post" class="inline">
                        <button class="w-9 h-9 rounded-lg hover:bg-negative-soft flex items-center justify-center text-ink-soft hover:text-negative"
                                onclick="return confirm('¿Borrar este movimiento?')" title="Borrar">
                            <i class="ph ph-trash"></i>
                        </button>
                    </form>
                </div>
            </li>
        </ul>
    </section>

    <!-- Pagination -->
    <nav class="flex items-center justify-between mt-6 text-sm" th:if="${hasNext or hasPrev}">
        <a th:if="${hasPrev != null and hasPrev}" th:href="@{/movimientos(page=${page - 1}, categoriaId=${currentCategoriaId}, desde=${desde}, hasta=${hasta})}"
           class="btn btn-ghost"><i class="ph ph-arrow-left"></i> Anterior</a>
        <span th:unless="${hasPrev}"></span>
        <span class="text-ink-soft text-xs" th:text="'Página ' + (${page} + 1)">Página 1</span>
        <a th:if="${hasNext != null and hasNext}" th:href="@{/movimientos(page=${page + 1}, categoriaId=${currentCategoriaId}, desde=${desde}, hasta=${hasta})}"
           class="btn btn-ghost">Siguiente <i class="ph ph-arrow-right"></i></a>
    </nav>

</main>
</body>
</html>
