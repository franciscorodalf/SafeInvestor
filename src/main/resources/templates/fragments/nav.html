<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
    Top nav reutilizable.
    Uso: <nav th:replace="~{fragments/nav :: nav('movimientos')}"></nav>
    Pasar la sección activa: home, movimientos, categorias, objetivos, tareas
-->
<body>
<nav th:fragment="nav(active)" class="bg-surface/80 backdrop-blur border-b border-line sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-5 py-4 flex justify-between items-center">
        <a href="/" class="flex items-center gap-2 group">
            <img src="/images/logo.png" alt="SafeInvestor" class="logo-mark h-14 w-14 object-contain group-hover:opacity-85">
            <span class="font-display text-2xl tracking-tight hidden sm:inline">SafeInvestor</span>
        </a>
        <div sec:authorize="isAuthenticated()" class="hidden md:flex items-center gap-1 text-sm">
            <a href="/movimientos"
               th:classappend="${active == 'movimientos'} ? 'bg-bg-soft text-ink font-medium' : 'text-ink-soft hover:text-ink hover:bg-bg-soft'"
               class="px-3 py-2 rounded-lg flex items-center gap-1.5">
                <i class="ph ph-arrows-down-up text-base"></i> <span th:text="#{nav.movimientos}">Movimientos</span>
            </a>
            <a href="/categorias"
               th:classappend="${active == 'categorias'} ? 'bg-bg-soft text-ink font-medium' : 'text-ink-soft hover:text-ink hover:bg-bg-soft'"
               class="px-3 py-2 rounded-lg flex items-center gap-1.5">
                <i class="ph ph-tag text-base"></i> <span th:text="#{nav.categorias}">Categorías</span>
            </a>
            <a href="/objetivos"
               th:classappend="${active == 'objetivos'} ? 'bg-bg-soft text-ink font-medium' : 'text-ink-soft hover:text-ink hover:bg-bg-soft'"
               class="px-3 py-2 rounded-lg flex items-center gap-1.5">
                <i class="ph ph-target text-base"></i> <span th:text="#{nav.objetivos}">Objetivos</span>
            </a>
            <a href="/tareas"
               th:classappend="${active == 'tareas'} ? 'bg-bg-soft text-ink font-medium' : 'text-ink-soft hover:text-ink hover:bg-bg-soft'"
               class="px-3 py-2 rounded-lg flex items-center gap-1.5">
                <i class="ph ph-list-checks text-base"></i> <span th:text="#{nav.tareas}">Tareas</span>
            </a>
            <a href="/presupuestos"
               th:classappend="${active == 'presupuestos'} ? 'bg-bg-soft text-ink font-medium' : 'text-ink-soft hover:text-ink hover:bg-bg-soft'"
               class="px-3 py-2 rounded-lg flex items-center gap-1.5">
                <i class="ph ph-piggy-bank text-base"></i> <span th:text="#{nav.presupuestos}">Presupuestos</span>
            </a>
            <a href="/recurrentes"
               th:classappend="${active == 'recurrentes'} ? 'bg-bg-soft text-ink font-medium' : 'text-ink-soft hover:text-ink hover:bg-bg-soft'"
               class="px-3 py-2 rounded-lg flex items-center gap-1.5">
                <i class="ph ph-repeat text-base"></i> <span th:text="#{nav.recurrentes}">Recurrentes</span>
            </a>
            <a href="/tips"
               th:classappend="${active == 'tips'} ? 'bg-bg-soft text-ink font-medium' : 'text-ink-soft hover:text-ink hover:bg-bg-soft'"
               class="px-3 py-2 rounded-lg flex items-center gap-1.5">
                <i class="ph ph-lightbulb text-base"></i> <span th:text="#{nav.tips}">Tips</span>
            </a>
        </div>
        <div sec:authorize="isAuthenticated()" class="flex items-center gap-3">
            <!-- Selector de idioma -->
            <div class="hidden sm:flex items-center gap-1 text-xs font-mono text-ink-soft border border-line rounded-md overflow-hidden" th:title="#{nav.lang}">
                <a th:href="@{(lang='es')}" class="px-2 py-1"
                   th:classappend="${#locale.language == 'es'} ? 'bg-ink text-bg' : 'hover:bg-bg-soft'">ES</a>
                <a th:href="@{(lang='en')}" class="px-2 py-1"
                   th:classappend="${#locale.language == 'en'} ? 'bg-ink text-bg' : 'hover:bg-bg-soft'">EN</a>
            </div>
            <button type="button" onclick="toggleTheme()" id="theme-toggle"
                    class="w-9 h-9 rounded-lg text-ink-soft hover:text-ink hover:bg-bg-soft flex items-center justify-center"
                    th:title="#{nav.theme}" th:aria-label="#{nav.theme}">
                <i class="ph ph-moon text-lg show-in-light"></i>
                <i class="ph ph-sun text-lg show-in-dark"></i>
            </button>
            <a href="/perfil" class="hidden sm:flex items-center gap-2 text-sm text-ink-soft hover:text-ink"
               th:title="#{nav.perfil}">
                <span class="w-7 h-7 rounded-full bg-accent-soft text-accent flex items-center justify-center text-xs font-semibold uppercase"
                      sec:authentication="name" th:text="${#authentication.name.substring(0, 1)}"></span>
                <span sec:authentication="name"></span>
            </a>
            <form th:action="@{/logout}" method="post" class="inline">
                <button class="text-ink-soft hover:text-negative text-sm flex items-center gap-1.5" th:title="#{nav.logout}">
                    <i class="ph ph-sign-out text-base"></i>
                </button>
            </form>
        </div>
        <div sec:authorize="!isAuthenticated()" class="flex items-center gap-3 text-sm">
            <div class="hidden sm:flex items-center gap-1 text-xs font-mono text-ink-soft border border-line rounded-md overflow-hidden" th:title="#{nav.lang}">
                <a th:href="@{(lang='es')}" class="px-2 py-1"
                   th:classappend="${#locale.language == 'es'} ? 'bg-ink text-bg' : 'hover:bg-bg-soft'">ES</a>
                <a th:href="@{(lang='en')}" class="px-2 py-1"
                   th:classappend="${#locale.language == 'en'} ? 'bg-ink text-bg' : 'hover:bg-bg-soft'">EN</a>
            </div>
            <button type="button" onclick="toggleTheme()" id="theme-toggle-guest"
                    class="w-9 h-9 rounded-lg text-ink-soft hover:text-ink hover:bg-bg-soft flex items-center justify-center"
                    th:title="#{nav.theme}" th:aria-label="#{nav.theme}">
                <i class="ph ph-moon text-lg show-in-light"></i>
                <i class="ph ph-sun text-lg show-in-dark"></i>
            </button>
            <a href="/login" class="text-ink-soft hover:text-ink" th:text="#{nav.login}">Entrar</a>
            <a href="/register" class="btn btn-primary" th:text="#{nav.register}">Crear cuenta</a>
        </div>
    </div>

    <!-- Mobile nav (visible cuando autenticado) -->
    <div sec:authorize="isAuthenticated()" class="md:hidden border-t border-line bg-surface/60">
        <div class="max-w-6xl mx-auto px-2 py-2 flex justify-around text-xs">
            <a href="/movimientos" class="px-3 py-1 rounded flex flex-col items-center gap-0.5"
               th:classappend="${active == 'movimientos'} ? 'text-brand' : 'text-ink-soft'">
                <i class="ph ph-arrows-down-up text-lg"></i>
                <span th:text="#{nav.movimientos}">Movimientos</span>
            </a>
            <a href="/categorias" class="px-3 py-1 rounded flex flex-col items-center gap-0.5"
               th:classappend="${active == 'categorias'} ? 'text-brand' : 'text-ink-soft'">
                <i class="ph ph-tag text-lg"></i>
                <span th:text="#{nav.categorias}">Categorías</span>
            </a>
            <a href="/objetivos" class="px-3 py-1 rounded flex flex-col items-center gap-0.5"
               th:classappend="${active == 'objetivos'} ? 'text-brand' : 'text-ink-soft'">
                <i class="ph ph-target text-lg"></i>
                <span th:text="#{nav.objetivos}">Objetivos</span>
            </a>
            <a href="/tareas" class="px-3 py-1 rounded flex flex-col items-center gap-0.5"
               th:classappend="${active == 'tareas'} ? 'text-brand' : 'text-ink-soft'">
                <i class="ph ph-list-checks text-lg"></i>
                <span th:text="#{nav.tareas}">Tareas</span>
            </a>
            <a href="/tips" class="px-3 py-1 rounded flex flex-col items-center gap-0.5"
               th:classappend="${active == 'tips'} ? 'text-brand' : 'text-ink-soft'">
                <i class="ph ph-lightbulb text-lg"></i>
                <span th:text="#{nav.tips}">Tips</span>
            </a>
        </div>
    </div>
</nav>

<!-- Toasts globales: cualquier página con <nav> los muestra automáticamente -->
<div th:replace="~{fragments/toasts :: toasts}"></div>
</body>
</html>
