<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${objetivo.nombre})}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav('objetivos')}"></nav>

<main class="max-w-3xl mx-auto px-5 py-10">

    <a href="/objetivos" class="text-sm text-ink-soft hover:text-brand inline-flex items-center gap-1.5 mb-6">
        <i class="ph ph-arrow-left"></i> <span th:text="#{obj.det.back}">Volver a objetivos</span>
    </a>

    <!-- Hero card -->
    <section class="bg-surface border border-line rounded-lg p-8 shadow-sm mb-6 relative overflow-hidden fade-up">
        <div class="absolute -right-16 -top-16 w-48 h-48 rounded-full opacity-10"
             th:style="'background-color:' + ${objetivo.color}"></div>

        <div class="flex items-start justify-between mb-2 relative">
            <div class="flex items-center gap-3">
                <span class="inline-block w-5 h-5 rounded-full" th:style="'background-color:' + ${objetivo.color}"></span>
                <p class="text-xs tracking-[0.18em] uppercase text-ink-soft" th:text="#{obj.det.label}">Objetivo</p>
            </div>
            <span th:if="${objetivo.completado}" class="pill bg-positive-soft text-positive">
                <i class="ph ph-trophy-fill"></i> <span th:text="#{obj.det.completed}">Completado</span>
            </span>
        </div>

        <h1 class="font-display text-5xl mb-6 leading-tight relative" th:text="${objetivo.nombre}">Vacaciones</h1>

        <div class="flex items-baseline gap-3 mb-2 relative">
            <span class="font-mono font-semibold text-4xl" th:text="${#numbers.formatDecimal(objetivo.importeAhorrado, 1, 2) + ' €'}">0,00 €</span>
            <span class="text-ink-soft" th:text="${#messages.msg('obj.list.of') + ' ' + #numbers.formatDecimal(objetivo.importeObjetivo, 1, 2) + ' €'}">de 0,00 €</span>
        </div>

        <div class="bg-bg-soft rounded-full h-3 overflow-hidden mb-2 relative">
            <div class="h-full rounded-full transition-all"
                 th:style="'width:' + ${objetivo.porcentaje} + '%; background-color:' + ${objetivo.color}"></div>
        </div>
        <div class="flex justify-between text-sm text-ink-soft relative">
            <span th:if="${objetivo.fechaLimite != null}" class="flex items-center gap-1.5">
                <i class="ph ph-calendar"></i>
                <span th:text="${#messages.msg('obj.det.until', #temporals.format(objetivo.fechaLimite, #messages.msg('dashboard.month_short_format') + ' yyyy'))}">Antes del 31 dic 2026</span>
            </span>
            <span th:unless="${objetivo.fechaLimite}"></span>
            <span class="font-mono font-semibold" th:text="${objetivo.porcentaje} + '%'">0%</span>
        </div>
    </section>

    <!-- Aportar (solo si no completado) -->
    <section th:unless="${objetivo.completado}" class="bg-surface border border-line rounded-lg p-6 shadow-sm mb-6 fade-up">
        <h2 class="font-display text-2xl mb-4 flex items-center gap-2">
            <i class="ph ph-piggy-bank text-positive"></i> <span th:text="#{obj.det.aportar_title}">Aportar dinero</span>
        </h2>
        <form th:action="@{/objetivos/{id}/aportar(id=${objetivo.id})}" method="post" class="flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
                <input name="importe" type="number" step="0.01" min="0.01" required
                       placeholder="50.00"
                       class="input font-mono text-2xl py-3 pr-10 text-right">
                <span class="absolute right-4 top-1/2 -translate-y-1/2 font-mono text-xl text-ink-soft">€</span>
            </div>
            <button class="btn whitespace-nowrap text-bg" style="background:#2D6A4F;">
                <i class="ph ph-plus-circle text-lg"></i> <span th:text="#{obj.det.aportar_btn}">Aportar</span>
            </button>
        </form>
    </section>

    <!-- Completado celebración -->
    <section th:if="${objetivo.completado}" class="bg-positive-soft border border-positive/30 rounded-lg p-6 mb-6 text-center fade-up">
        <i class="ph ph-confetti text-4xl text-positive mb-2 block"></i>
        <h2 class="font-display text-2xl text-positive mb-1" th:text="#{obj.det.celebracion_title}">¡Lo conseguiste!</h2>
        <p class="text-sm text-positive/80"
           th:text="${#messages.msg('obj.det.celebracion_msg', #numbers.formatDecimal(objetivo.importeObjetivo, 1, 2))}">
            Has alcanzado tu meta de 0,00 €.
        </p>
    </section>

    <!-- Acciones -->
    <div class="flex justify-between text-sm">
        <a th:href="@{/objetivos/{id}/editar(id=${objetivo.id})}" class="text-brand hover:underline flex items-center gap-1">
            <i class="ph ph-pencil-simple"></i> <span th:text="#{obj.det.edit}">Editar objetivo</span>
        </a>
        <form th:action="@{/objetivos/{id}/borrar(id=${objetivo.id})}" method="post">
            <button class="text-negative hover:underline flex items-center gap-1"
                    th:onclick="'return confirm(\\'' + #{obj.det.confirm_delete} + '\\')'">
                <i class="ph ph-trash"></i> <span th:text="#{obj.det.delete}">Borrar</span>
            </button>
        </form>
    </div>

</main>
</body>
</html>
