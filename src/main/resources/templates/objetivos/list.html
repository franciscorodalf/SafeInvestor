<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Objetivos de ahorro')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav('objetivos')}"></nav>

<main class="max-w-6xl mx-auto px-5 py-8">

    <header class="flex items-end justify-between mb-8 flex-wrap gap-4 fade-up">
        <div>
            <p class="text-xs tracking-[0.18em] uppercase text-ink-soft mb-1" th:text="#{obj.list.eyebrow}">Hacia dónde</p>
            <h1 class="font-display text-5xl leading-tight" th:text="#{obj.list.title}">Objetivos de ahorro</h1>
        </div>
        <a href="/objetivos/nuevo" class="btn btn-primary">
            <i class="ph ph-plus text-lg"></i> <span th:text="#{obj.list.new}">Nuevo objetivo</span>
        </a>
    </header>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(objetivos)}" class="bg-surface border border-line rounded-lg p-12 text-center fade-up">
        <div class="inline-flex w-16 h-16 rounded-full bg-brand-soft items-center justify-center text-brand mb-4">
            <i class="ph ph-target text-3xl"></i>
        </div>
        <p class="font-display text-2xl mb-2" th:text="#{obj.list.empty_title}">Sin objetivos todavía.</p>
        <p class="text-ink-soft mb-6 max-w-md mx-auto" th:text="#{obj.list.empty_subtitle}">
            ¿Quieres ahorrar para algo concreto? Define un objetivo con fecha límite y ve aportando poco a poco.
        </p>
        <a href="/objetivos/nuevo" class="btn btn-primary">
            <i class="ph ph-plus"></i> <span th:text="#{obj.list.empty_cta}">Crear el primero</span>
        </a>
    </div>

    <!-- Grid de objetivos -->
    <div th:unless="${#lists.isEmpty(objetivos)}" class="grid grid-cols-1 md:grid-cols-2 gap-4 stagger">
        <a th:each="o : ${objetivos}" th:href="@{/objetivos/{id}(id=${o.id})}"
           class="bg-surface border border-line rounded-lg p-6 shadow-sm card-hover block relative overflow-hidden"
           th:classappend="${o.completado} ? 'opacity-80'">

            <!-- Decoración de color en la esquina -->
            <div class="absolute -right-8 -top-8 w-24 h-24 rounded-full opacity-10"
                 th:style="'background-color:' + ${o.color}"></div>

            <div class="flex items-start justify-between mb-4 relative">
                <div class="flex items-center gap-2.5">
                    <span class="inline-block w-3 h-3 rounded-full shrink-0" th:style="'background-color:' + ${o.color}"></span>
                    <h2 class="font-display text-2xl truncate" th:text="${o.nombre}">Vacaciones</h2>
                </div>
                <span th:if="${o.completado}" class="pill bg-positive-soft text-positive whitespace-nowrap">
                    <i class="ph ph-check-circle-fill"></i> <span th:text="#{obj.list.completed}">Completado</span>
                </span>
            </div>

            <div class="flex items-baseline gap-2 mb-4 relative">
                <span class="font-mono font-semibold text-2xl" th:text="${#numbers.formatDecimal(o.importeAhorrado, 1, 2) + ' €'}">0,00 €</span>
                <span class="text-ink-soft text-sm" th:text="${#messages.msg('obj.list.of') + ' ' + #numbers.formatDecimal(o.importeObjetivo, 1, 2) + ' €'}">de 0,00 €</span>
            </div>

            <!-- Progress bar -->
            <div class="bg-bg-soft rounded-full h-2.5 overflow-hidden mb-2 relative">
                <div class="h-full rounded-full transition-all"
                     th:style="'width:' + ${o.porcentaje} + '%; background-color:' + ${o.color}"></div>
            </div>
            <div class="flex items-center justify-between text-xs text-ink-soft relative">
                <span th:if="${o.fechaLimite != null}" class="flex items-center gap-1">
                    <i class="ph ph-calendar"></i>
                    <span th:text="${#messages.msg('obj.list.until', #temporals.format(o.fechaLimite, #messages.msg('dashboard.month_short_format') + ' yyyy'))}">Hasta 31 dic 2026</span>
                </span>
                <span th:unless="${o.fechaLimite}" class="text-ink-soft/60" th:text="#{obj.list.no_deadline}">Sin fecha límite</span>
                <span class="font-mono font-semibold" th:text="${o.porcentaje} + '%'">0%</span>
            </div>
        </a>
    </div>

</main>
</body>
</html>
