<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Objetivo — SafeInvestor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white shadow">
    <div class="max-w-5xl mx-auto px-4 py-3">
        <a href="/" class="text-xl font-bold text-blue-600">SafeInvestor</a>
    </div>
</nav>
<main class="max-w-md mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-4" th:text="${form.id == null ? 'Nuevo objetivo' : 'Editar objetivo'}">Objetivo</h1>
    <form th:action="${form.id == null ? '/objetivos' : '/objetivos/' + form.id}"
          th:object="${form}" method="post" class="bg-white p-6 rounded shadow space-y-3">
        <label class="block">
            <span class="text-sm text-gray-700">Nombre</span>
            <input th:field="*{nombre}" type="text" required maxlength="100" class="mt-1 w-full px-3 py-2 border rounded">
            <span class="text-red-600 text-xs" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
        </label>
        <label class="block">
            <span class="text-sm text-gray-700">Importe a alcanzar (€)</span>
            <input th:field="*{importeObjetivo}" type="number" step="0.01" min="0.01" required
                   class="mt-1 w-full px-3 py-2 border rounded">
        </label>
        <label class="block">
            <span class="text-sm text-gray-700">Fecha límite (opcional)</span>
            <input th:field="*{fechaLimite}" type="date" class="mt-1 w-full px-3 py-2 border rounded">
        </label>
        <label class="block">
            <span class="text-sm text-gray-700">Color</span>
            <input th:field="*{color}" type="color" class="mt-1 h-10 w-20 border rounded">
        </label>
        <div class="flex justify-between pt-2">
            <a href="/objetivos" class="text-gray-600 hover:underline">Cancelar</a>
            <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Guardar</button>
        </div>
    </form>
</main>
</body>
</html>
